name: Update Claude Portfolio (weekly)

# Authoritative persistence runner for the Claude Portfolio. Vercel's FS is
# read-only/ephemeral, so the weekly selection is generated here and committed
# back to the repo — each commit triggers a Vercel redeploy that serves the
# fresh data. (Replaces the former vercel.json cron, which never persisted.)

on:
  schedule:
    # 21:00 UTC Monday == 06:00 JST Tuesday
    - cron: "0 21 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize with the daily performance job so the two never race on push.
concurrency:
  group: portfolio-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate weekly portfolio
        run: npm run update:portfolio
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOKENS_XYZ_API_KEY: ${{ secrets.TOKENS_XYZ_API_KEY }}

      - name: Commit & push data
        run: |
          git config user.name "osd-portfolio-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio-history.json
          if git diff --staged --quiet; then
            echo "No portfolio changes to commit."
          else
            git commit -m "chore(portfolio): weekly Claude portfolio update [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
