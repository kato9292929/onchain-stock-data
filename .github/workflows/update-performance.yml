name: Update Portfolio Performance (daily)

# Authoritative persistence runner for the daily SPY/QQQ vs portfolio index.
# Generated here and committed back to the repo (Vercel FS is read-only).
# (Replaces the former vercel.json cron, which never persisted.)

on:
  schedule:
    # 21:30 UTC daily == 06:30 JST next day
    - cron: "30 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Shared group with the weekly portfolio job so the two never race on push.
concurrency:
  group: portfolio-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Record daily performance
        run: npm run update:performance
        env:
          TOKENS_XYZ_API_KEY: ${{ secrets.TOKENS_XYZ_API_KEY }}
          BENCHMARK_PROVIDER: ${{ secrets.BENCHMARK_PROVIDER || 'yahoo' }}

      - name: Commit & push data
        run: |
          git config user.name "osd-portfolio-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/performance-history.json
          if git diff --staged --quiet; then
            echo "No performance changes to commit."
          else
            git commit -m "chore(performance): daily SPY/QQQ vs portfolio update [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
